services:
  pfadiheim:
    build:
      context: ../apache
      dockerfile: Dockerfile
    image: kirby-apache:latest
    container_name: pfadiheim-web
    restart: unless-stopped
    init: true
    volumes:
      - ./www:/var/www/site
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - pfadiheim-internal

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"

    # HTTPS – Staging/Master auf asgard: new.pfadiheim-buelach.ch
    # (www + nackte Domain + IDN laufen bis zur DNS-Umstellung noch auf dem alten Server;
    #  deren Router erst wieder aktivieren, wenn das DNS hierher zeigt – sonst ACME-Fehler)
      - "traefik.http.routers.pfadiheim.rule=Host(`new.pfadiheim-buelach.ch`)"
      - "traefik.http.routers.pfadiheim.entrypoints=websecure"
      - "traefik.http.routers.pfadiheim.tls.certresolver=letsencrypt"
      - "traefik.http.services.pfadiheim.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
  pfadiheim-internal:
    internal: true
